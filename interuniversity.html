<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="interuniversity.css">
    <title>inter-university transfer</title>
</head>
<body class="body-apply">
    <section class="container-apply">
        <img src="logo.avif" alt="logo" class="logo-apply">
        <h1>University of maiduguri</h1>
        <h2>Inter-University Transfer</h2>
        <p class="create-acc-uni-apply">create an account to begin your transfer</p>
        <form action="#" >
            
            <div class="hero">
            <div class="f-c"><label for="Surname">Surname: *</label>
            <input type="text" id="Surname" name="surname" required placeholder="Hamzat"></div>
             
            <div class="s-c"><label for="first-name">First Name: *</label>
            <input type="text" id="first-name" name="first_name" required placeholder="Habib">
            </div>
            </div>

            <label for="middle-name">Middle Name:</label>
            <input type="text" id="middle-name" name="middle_name" placeholder="Adinoyi (Optional)">

            <label for="email">Email: *</label>
            <input type="email" id="email" name="email" required placeholder="hamzat@example.com">
            <small class="smalltext">this will be your login username</small>
            
            <label for="phone">Phone Number: *</label>
            <input type="tel" id="phone" name="phone" required placeholder="08141707856">

            <label for="gender">Gender: *</label>
            <select id="gender" name="gender" required>
                <option value="">Select Gender</option>
                <option value="male">Male</option>
                <option value="female">Female</option>
            </select>
            <div class="hero">
            <div class="s-c">
            <label for="pass-word">Password: *</label>
            <input type="password" id="pass-word" name="password" required placeholder="Enter your password">
            </div>
            <div class="s-c">
            <label for="confirm-pass">Confirm Password: *</label>
            <input type="password" id="confirm-pass" name="confirm_password" required placeholder="Confirm your password">
            </div>
            </div>

            <button class="btn" type="submit">Create Account</button>

            <p>Already have an account? <a href="index.html"  class="alhaa">Login here</a></p>
        </form>
    </section>
    <div class="footer">
        <p class="tf">Transfer Fees</p>
        <p class="tf-amt">Within Nigeria: ₦150,000.00 | Abroad: ₦250,000.00 </p>
    </div>
</body>
</html>
